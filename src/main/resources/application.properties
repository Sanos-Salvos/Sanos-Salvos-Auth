spring.application.name=sanos-salvos-auth
server.port=8088

# PostgreSQL: Detecta autom·ticamente si usa 'base-datos-postgres' (Docker) o 'localhost' (IntelliJ)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/auth_db
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka: Flexible
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:9092
spring.kafka.consumer.group-id=auth-group

# JWT
jwt.secret=sanosysalvos1234
jwt.expiration=86400000