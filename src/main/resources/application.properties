spring.application.name=sanos-salvos-auth
server.port=8088

# PostgreSQL: Detecta automaticamente si usa 'base-datos-postgres' (Docker) o 'localhost' (IntelliJ)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/users_db
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
